<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Wedding Pass</title>
    <!-- Links limpos -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
        rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">💍 Wedding Pass</a>
            <div class="d-flex align-items-center ms-auto">
                <span class="me-3 fw-bold" id="user-info"></span>
                <button class="btn btn-outline-danger btn-sm" id="btn-logout">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Painel Administrativo</h2>
            <div>
                <a href="../recepcao/checkin.html" class="btn btn-outline-secondary me-2">Ver Recepção</a>
                <!-- Novo Botão para abrir o Modal -->
                <button class="btn btn-primary me-2" data-bs-toggle="modal" data-bs-target="#modalNovoConvidado"
                    style="background-color: #d63384; border-color: #d63384;">
                    <i class="bi bi-person-plus"></i> Novo Convidado
                </button>
                <button class="btn btn-success" onclick="gerarPDF()"><i class="bi bi-file-pdf"></i> Exportar
                    PDF</button>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="stats-card text-center">
                    <h5 class="text-muted">Estatísticas de Ocupação</h5>
                    <div style="position: relative; height: 200px; width: 100%;">
                        <canvas id="graficoOcupacao"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-8 mb-3">
                <div class="stats-card">
                    <h5 class="text-muted mb-3">Lista Geral de Convidados</h5>
                    <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-dark" style="position: sticky; top: 0;">
                                <tr>
                                    <th>Nome</th>
                                    <th>CPF</th>
                                    <th>Telefone</th>
                                    <th>Mesa</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-convidados-admin"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- MODAL DE CADASTRO DE CONVIDADO             -->
    <!-- ========================================== -->
    <div class="modal fade" id="modalNovoConvidado" tabindex="-1" aria-labelledby="modalNovoConvidadoLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalNovoConvidadoLabel">Cadastrar Novo Convidado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <form id="form-novo-convidado">
                    <div class="modal-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="cad-nome" class="form-label">Nome *</label>
                                <input type="text" class="form-control" id="cad-nome" required>
                            </div>
                            <div class="col-md-6">
                                <label for="cad-sobrenome" class="form-label">Apelido *</label>
                                <input type="text" class="form-control" id="cad-sobrenome" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="cad-cpf" class="form-label">CPF (Opcional)</label>
                                <input type="text" class="form-control" id="cad-cpf" placeholder="000.000.000-00">
                            </div>
                            <div class="col-md-6">
                                <label for="cad-telefone" class="form-label">Telefone</label>
                                <input type="text" class="form-control" id="cad-telefone">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label for="cad-email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="cad-email">
                            </div>
                            <div class="col-md-4">
                                <label for="cad-mesa" class="form-label">Nº Mesa *</label>
                                <input type="number" class="form-control" id="cad-mesa" min="1" required>
                            </div>
                        </div>
                        <div id="cadastro-msg" class="d-none text-center"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary"
                            style="background-color: #d63384; border-color: #d63384;">Salvar Convidado</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bibliotecas e Scripts limpos (Adicionado o Bootstrap Bundle JS para o Modal funcionar) -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js"></script>
</body>

</html>
