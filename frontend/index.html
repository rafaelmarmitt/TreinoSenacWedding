<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wedding Pass</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <div class="login-container">
            <h3 class="text-center mb-4" style="color: #d63384;">Wedding Pass</h3>
            <form id="login-form">
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" required placeholder="admin@weddingpass.com">
                </div>
                <div class="mb-3">
                    <label for="senha" class="form-label">Palavra-passe</label>
                    <input type="password" class="form-control" id="senha" required placeholder="123456">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary"
                        style="background-color: #d63384; border-color: #d63384;">Entrar</button>
                </div>
                <div id="login-error" class="text-danger mt-3 text-center d-none"></div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
