<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in - Wedding Pass</title>
    <!-- Links limpos -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
        rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">💍 Wedding Pass</a>
            <div class="d-flex align-items-center ms-auto">
                <span class="me-3 fw-bold" id="user-info"></span>
                <button class="btn btn-outline-danger btn-sm" id="btn-logout">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4">Recepção - Controle de Entrada</h2>

        <!-- Botão para voltar ao dashboard visível apenas para admin -->
        <div id="admin-actions" class="mb-3 d-none">
            <a href="../admin/dashboard.html" class="btn btn-outline-secondary">← Voltar ao Dashboard</a>
        </div>

        <div class="card mb-4 shadow-sm border-0">
            <div class="card-body bg-light rounded">
                <input type="text" id="busca-convidado" class="form-control form-control-lg"
                    placeholder="Pesquisar por nome, apelido ou CPF..." oninput="buscarConvidados(this.value)">
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-secondary">
                    <tr>
                        <th>Nome Completo</th>
                        <th>CPF</th>
                        <th>Mesa</th>
                        <!-- NOVA COLUNA PARA OS ACOMPANHANTES -->
                        <th class="text-center">Acompanhantes</th>
                        <th class="text-center">Ação (Check-in)</th>
                    </tr>
                </thead>
                <tbody id="tabela-recepcao"></tbody>
            </table>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/recepcao.js"></script>
</body>

</html>
